<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS AI Disruption Index</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            padding: 2rem 2rem 0.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        header p {
            font-size: 0.9rem;
            color: #888;
            max-width: 700px;
            line-height: 1.5;
        }

        .filter-bar {
            max-width: 1000px;
            margin: 0.8rem auto 0;
            padding: 0 2rem;
            font-size: 0.85rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-bar select {
            background: #1a1a2e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        #chart-container {
            max-width: 1000px;
            margin: 0.5rem auto;
            padding: 0 2rem;
        }

        svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        .axis text {
            fill: #888;
            font-size: 12px;
        }

        .axis path, .axis line {
            stroke: #333;
        }

        .axis-label {
            fill: #aaa;
            font-size: 13px;
            font-weight: 500;
        }

        .axis-note {
            fill: #666;
            font-size: 11px;
            font-style: italic;
        }

        .company-bubble {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .company-label {
            fill: #ccc;
            font-size: 10px;
            pointer-events: none;
        }

        .mean-label {
            fill: #888;
            font-size: 11px;
            font-style: italic;
        }

        .tooltip {
            position: absolute;
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 320px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .tooltip.pinned {
            pointer-events: auto;
            opacity: 1;
        }

        .tooltip h3 {
            font-size: 15px;
            color: #fff;
            margin-bottom: 4px;
        }

        .tooltip .category {
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .tooltip .score-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }

        .tooltip .score-label { color: #aaa; }
        .tooltip .score-value { color: #fff; font-weight: 600; }

        .tooltip .composite {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #333;
            font-size: 14px;
        }

        .tooltip .reasoning {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #333;
            color: #999;
            font-size: 12px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <header>
        <h1>How vulnerable is a SaaS company to AI disruption?</h1>
        <p>The disruption index captures the potential for displacement through generative AI.</p>
    </header>

    <div class="filter-bar">
        <span>To explore, select a category and click on the bubbles:</span>
        <select id="category-filter"><option value="All">All</option></select>
    </div>

    <div id="chart-container"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
    (async function() {
        const data = await d3.json('data/companies.json');
        const companies = data.companies.map(c => ({
            ...c,
            disruptionScore: +(
                c.domainExpertiseOverlap * 0.45 +
                c.smallBusinessExposure * 0.30 +
                (10 - c.standardSetterDefensibility) * 0.25
            ).toFixed(2)
        }));

        // Categories for filter
        const categories = [...new Set(companies.map(c => c.category))].sort();
        const select = document.getElementById('category-filter');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            select.appendChild(opt);
        });

        // Mean score
        const meanScore = d3.mean(companies, d => d.disruptionScore);

        // Dimensions
        const containerWidth = document.getElementById('chart-container').clientWidth;
        const margin = { top: 30, right: 30, bottom: 30, left: 70 };
        const width = containerWidth - margin.left - margin.right;
        const height = Math.max(600, Math.min(800, width * 0.9));

        const svg = d3.select('#chart-container')
            .append('svg')
            .attr('viewBox', `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
            .append('g')
            .attr('transform', `translate(${margin.left},${margin.top})`);

        // Y scale: disruption score
        const yDomain = [2, 8.5];
        const y = d3.scaleLinear().domain(yDomain).range([height, 0]);

        // Y axis
        svg.append('g').attr('class', 'axis')
            .call(d3.axisLeft(y).ticks(8).tickSize(-width).tickFormat(d => d.toFixed(1)))
            .call(g => g.selectAll('.tick line').attr('stroke', '#1a1a2e').attr('stroke-dasharray', '2,4'))
            .call(g => g.select('.domain').remove());

        // Axis label
        svg.append('text')
            .attr('class', 'axis-label')
            .attr('transform', 'rotate(-90)')
            .attr('x', -height / 2)
            .attr('y', -50)
            .attr('text-anchor', 'middle')
            .text('Disruption score');

        // "Higher likelihood" note
        svg.append('text')
            .attr('class', 'axis-note')
            .attr('x', -60)
            .attr('y', y(7.8))
            .text('Higher likelihood of');
        svg.append('text')
            .attr('class', 'axis-note')
            .attr('x', -60)
            .attr('y', y(7.8) + 14)
            .text('disruption');

        // Mean line
        svg.append('line')
            .attr('x1', 0)
            .attr('x2', width)
            .attr('y1', y(meanScore))
            .attr('y2', y(meanScore))
            .attr('stroke', '#555')
            .attr('stroke-dasharray', '6,4')
            .attr('stroke-width', 1);

        svg.append('text')
            .attr('class', 'mean-label')
            .attr('x', -5)
            .attr('y', y(meanScore) + 4)
            .attr('text-anchor', 'end')
            .text('mean');

        // Bubble properties
        const bubbleRadius = 8;
        const bubbleFill = '#9b8ec4';
        const bubbleStroke = '#7b6ea4';

        // Force simulation — beeswarm
        const simulation = d3.forceSimulation(companies)
            .force('y', d3.forceY(d => y(d.disruptionScore)).strength(1))
            .force('x', d3.forceX(width / 2).strength(0.07))
            .force('collide', d3.forceCollide(bubbleRadius + 1.5).strength(1))
            .stop();

        // Run simulation
        for (let i = 0; i < 300; i++) simulation.tick();

        // Clamp x positions
        companies.forEach(d => {
            d.x = Math.max(bubbleRadius, Math.min(width - bubbleRadius, d.x));
        });

        // Draw bubbles
        const bubbles = svg.selectAll('.company-bubble')
            .data(companies)
            .enter()
            .append('circle')
            .attr('class', 'company-bubble')
            .attr('cx', d => d.x)
            .attr('cy', d => d.y)
            .attr('r', bubbleRadius)
            .attr('fill', bubbleFill)
            .attr('fill-opacity', 0.85)
            .attr('stroke', bubbleStroke)
            .attr('stroke-width', 1);

        // Labels for notable companies (top/bottom scores + some middle)
        const sorted = [...companies].sort((a, b) => b.disruptionScore - a.disruptionScore);
        const labelSet = new Set();
        // Top 8 and bottom 4
        sorted.slice(0, 8).forEach(d => labelSet.add(d.name));
        sorted.slice(-4).forEach(d => labelSet.add(d.name));
        // A few mid-range
        const mid = sorted.slice(Math.floor(sorted.length / 2) - 2, Math.floor(sorted.length / 2) + 2);
        mid.forEach(d => labelSet.add(d.name));

        svg.selectAll('.company-label')
            .data(companies.filter(d => labelSet.has(d.name)))
            .enter()
            .append('text')
            .attr('class', 'company-label')
            .attr('x', d => d.x + bubbleRadius + 3)
            .attr('y', d => d.y + 3)
            .text(d => d.name);

        // Tooltip
        const tooltip = d3.select('#tooltip');
        let pinnedCompany = null;

        function showTooltip(event, d) {
            const scoreColor = d.disruptionScore >= 6 ? '#ef4444' : d.disruptionScore >= 4.5 ? '#f59e0b' : '#14b8a6';
            tooltip.html(`
                <h3>${d.name} ${d.ticker !== 'Private' ? '(' + d.ticker + ')' : ''}</h3>
                <div class="category">${d.category}</div>
                <div class="score-row"><span class="score-label">Domain Expertise Overlap</span><span class="score-value">${d.domainExpertiseOverlap}/10</span></div>
                <div class="score-row"><span class="score-label">SMB Exposure</span><span class="score-value">${d.smallBusinessExposure}/10</span></div>
                <div class="score-row"><span class="score-label">Standard-Setter Defensibility</span><span class="score-value">${d.standardSetterDefensibility}/10</span></div>
                <div class="score-row composite"><span class="score-label">Disruption Score</span><span class="score-value" style="color: ${scoreColor}">${d.disruptionScore}/10</span></div>
                <div class="reasoning">${d.reasoning}</div>
            `);

            const ttNode = tooltip.node();
            const ttWidth = 300;
            let left = event.pageX + 15;
            let top = event.pageY - 10;
            if (left + ttWidth > window.innerWidth - 20) left = event.pageX - ttWidth - 15;
            if (top + 200 > window.innerHeight - 20) top = event.pageY - 200;
            tooltip.style('left', left + 'px').style('top', top + 'px');
        }

        // Click to pin tooltip
        bubbles.on('click', function(event, d) {
            event.stopPropagation();
            if (pinnedCompany === d) {
                pinnedCompany = null;
                tooltip.classed('pinned', false).style('opacity', 0);
                return;
            }
            pinnedCompany = d;
            showTooltip(event, d);
            tooltip.classed('pinned', true).style('opacity', 1);
        });

        // Hover for non-pinned
        bubbles.on('mouseover', function(event, d) {
            if (!pinnedCompany) {
                showTooltip(event, d);
                tooltip.style('opacity', 1);
            }
        }).on('mousemove', function(event) {
            if (!pinnedCompany) {
                const ttWidth = tooltip.node().offsetWidth;
                let left = event.pageX + 15;
                let top = event.pageY - 10;
                if (left + ttWidth > window.innerWidth - 20) left = event.pageX - ttWidth - 15;
                tooltip.style('left', left + 'px').style('top', top + 'px');
            }
        }).on('mouseout', function() {
            if (!pinnedCompany) {
                tooltip.style('opacity', 0);
            }
        });

        // Click elsewhere to dismiss pinned tooltip
        d3.select('body').on('click', function() {
            pinnedCompany = null;
            tooltip.classed('pinned', false).style('opacity', 0);
        });

        // Category filter
        select.addEventListener('change', function() {
            const val = this.value;
            if (val === 'All') {
                bubbles.attr('fill-opacity', 0.85);
                svg.selectAll('.company-label').attr('opacity', 1);
            } else {
                bubbles.attr('fill-opacity', d => d.category === val ? 0.9 : 0.12);
                svg.selectAll('.company-label').attr('opacity', d => d.category === val ? 1 : 0.15);
            }
        });
    })();
    </script>
</body>
</html>
